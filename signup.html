<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Create Account</title>

  <link rel="stylesheet" href="book.css" />

  <script
    type="module"
    src="signup.js"
    defer
  ></script>

</head>

<body>

  <div class="booking-container">

    <h1>Create Account</h1>

    <form id="signupForm">

      <input
        type="text"
        id="signupName"
        placeholder="Full Name"
        required
      />

      <input
        type="email"
        id="signupEmail"
        placeholder="Email"
        required
      />

      <input
        type="password"
        id="signupPassword"
        placeholder="Password"
        required
      />

      <button
        type="submit"
        class="submit-btn"
      >
        Create Account
      </button>

    </form>

    <div id="signupMessage"></div>

  </div>

</body>
</html>
