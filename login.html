<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Admin Login</title>

  <link rel="stylesheet" href="book.css" />

  <script
    type="module"
    src="login.js"
    defer
  ></script>

</head>

<body>

  <div class="booking-container">

    <h1>Admin Login</h1>

    <form id="loginForm">

      <input
        type="email"
        id="loginEmail"
        placeholder="Email"
        required
      />

      <input
        type="password"
        id="loginPassword"
        placeholder="Password"
        required
      />

      <button
        type="submit"
        class="submit-btn"
      >
        Login
      </button>

    </form>

    <div id="loginMessage"></div>

  </div>

</body>
</html>
